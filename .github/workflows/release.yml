name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from main.go
        id: version
        run: |
          VERSION=$(grep -oP 'var version = "\K[^"]+' main.go)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-go@v5
        if: steps.tag_check.outputs.exists == 'false'
        with:
          go-version-file: go.mod
          cache: true

      - name: Import GPG key
        if: steps.tag_check.outputs.exists == 'false'
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Generate documentation
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@latest
          tfplugindocs generate --provider-name stalwart

      - name: Commit generated docs
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Generated Terraform registry docs [skip ci]"

      - name: Create and push release tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git push origin main
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Run GoReleaser
        if: steps.tag_check.outputs.exists == 'false'
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      - name: Delete tag on failure
        if: failure() && steps.version.outputs.version != ''
        run: |
          git push origin --delete "v${{ steps.version.outputs.version }}" || true
